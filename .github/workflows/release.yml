name: Release

# 正式版由 v* tag 触发；开发版由 main 推送触发（持续更新 nightly prerelease）
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/xhh-app/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: crates/xhh-app/frontend

      - name: Build app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: crates/xhh-app

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            version="${GITHUB_REF_NAME#v}"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "name=黑盒工坊 ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            conf_version=$(grep -oE '"version"[[:space:]]*:[[:space:]]*"[^"]*"' crates/xhh-app/tauri.conf.json | head -1 | sed -E 's/.*"version"[[:space:]]*:[[:space:]]*"([^"]*)".*/\1/')
            sha=$(echo "${GITHUB_SHA}" | cut -c1-7)
            date=$(date -u +%Y-%m-%d)
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "version=nightly" >> "$GITHUB_OUTPUT"
            echo "name=黑盒工坊 开发版 (v${conf_version} ${date} ${sha})" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect and rename artifacts
        shell: bash
        run: |
          version="${{ steps.meta.outputs.version }}"
          installer=$(find target/release/bundle/nsis -name "*-setup.exe" | head -1)
          if [ -z "$installer" ]; then
            echo "::error::未找到 NSIS 安装包"
            exit 1
          fi
          cp "$installer" "黑盒工坊_${version}_x64-setup.exe"
          exe=""
          for name in xhh-workshop xhh-app; do
            if [ -f "target/release/$name.exe" ]; then
              exe="target/release/$name.exe"
              break
            fi
          done
          if [ -z "$exe" ]; then
            echo "::error::未找到构建出的主二进制"
            ls -la target/release/*.exe 2>/dev/null || true
            exit 1
          fi
          cp "$exe" "黑盒工坊_${version}_x64_portable.exe"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            安装版：运行 `*-setup.exe` 完成安装。
            便携版：双击 `*_portable.exe` 免安装运行（需 Windows 10/11 自带 WebView2 运行时）。

            详情与使用说明见 [README](https://github.com/Sakura520222/xhh-workshop#readme)。
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: |
            黑盒工坊_*_x64-setup.exe
            黑盒工坊_*_x64_portable.exe
